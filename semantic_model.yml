relationships:
  # =====================================================
  # CUSTOMER, ACCOUNT, TRANSACTION, DEVICE RELATIONSHIPS
  # =====================================================
  - name: CustomertoAccount_Relationship
    left_table: V_ACCOUNT
    right_table: V_CUSTOMER
    relationship_columns:
      - left_column: ACCOUNT_ID
        right_column: NODE_ID
    join_type: left_outer
    relationship_type: one_to_many

  - name: CustomertoDevice_Relationships
    left_table: V_DEVICE
    right_table: V_CUSTOMER
    relationship_columns:
      - left_column: DEVICE_ID
        right_column: NODE_ID
    join_type: left_outer
    relationship_type: one_to_one

  - name: CustomertoTransaction_Relationships
    left_table: V_TRANSACTION
    right_table: V_CUSTOMER
    relationship_columns:
      - left_column: TXN_ID
        right_column: NODE_ID
    join_type: left_outer
    relationship_type: one_to_many

  - name: AccounttoTransaction_Relationships
    left_table: V_TRANSACTION
    right_table: V_TRANSACTION
    relationship_columns:
      - left_column: TXN_ID
        right_column: NODE_ID
    join_type: left_outer
    relationship_type: one_to_many

# =====================================================
# METRICS - Pre-defined aggregations for Cortex Analyst
# =====================================================
metrics:
  - name: total_accounts
    expr: COUNT(DISTINCT ACCOUNT_ID)
    data_type: NUMBER
    description: "Total number of unique accounts for a customer"
    synonyms:
      - account_count
      - number_of_accounts

  - name: total_product_transactions
    expr: COUNT(DISTINCT ACCOUNT_ID)
    data_type: NUMBER
    description: "Total number of unique transactions involving products"
    synonyms:
      - product_transaction_count
      - number_of_product_transactions

  - name: total_customer_transactions
    expr: COUNT(DISTINCT CUSTOMER_ID)
    data_type: NUMBER
    description: "Total number of unique transactions involving customers"
    synonyms:
      - customer_transaction_count
      - number_of_customer_transactions

#WE CAN ADD AS MANY MORE WE WANT, AVG, COUNT(DIRECT RELATIONSHIP), COUNT(INDIRECT RELATIONSHIP)
# =====================================================
# FILTERS - Named WHERE clauses for common patterns
# =====================================================
filters:
  - name: active_customers
    expr: "EFFECTIVE_END IS NULL OR EFFECTIVE_END >= CURRENT_DATE()"
    description: "Filter for currently active customers (not expired)"
    synonyms:
      - current_customers
      - valid_customers

  - name: active_products
    expr: "EFFECTIVE_END IS NULL OR EFFECTIVE_END >= CURRENT_DATE()"
    description: "Filter for currently active products (not expired)"
    synonyms:
      - current_products
      - valid_products

  - name: active_customer_product_relationships
    expr: "EFFECTIVE_END IS NULL OR EFFECTIVE_END >= CURRENT_DATE()"
    description: "Filter for currently active customer-product relationships (not expired)"
    synonyms:
      - current_customer_product_relationships
      - valid_customer_product_relationships

  - name: active_customer_device_relationships
    expr: "EFFECTIVE_END IS NULL OR EFFECTIVE_END >= CURRENT_DATE()"
    description: "Filter for currently active customer-device relationships (not expired)"
    synonyms:
      - current_customer_device_relationships
      - valid_customer_device_relationships

verified_queries:
  # LEVEL 1: Basic Queries (Cortex Analyst - SQL-based)
  - name: current_customer_product_analysis_v2
    question: What is the current customer product relationship?
    use_as_onboarding_question: true
    sql: |
      SELECT 
        p.POSITION, 
        p.NATIONALITY, 
        p.NAME, 
        pf.JERSEY_NUMBER, 
        pf.EFFECTIVE_START as start_date
      FROM V_PLAYER p 
      JOIN V_PLAYS_FOR pf ON p.NODE_ID = pf.PLAYER_ID 
      JOIN V_CLUB c ON pf.CLUB_ID = c.NODE_ID 
      WHERE c.NAME = 'Real Madrid' 
        AND (pf.EFFECTIVE_END IS NULL OR pf.EFFECTIVE_END >= CURRENT_DATE())
      ORDER BY p.POSITION, p.NAME
    verified_by: Soccer Knowledge Graph Model V2
    verified_at: 1747672000

  # LEVEL 2: Intermediate Queries (Cortex Analyst - SQL-based)
  # LEVEL 3: Advanced SQL Queries (Cortex Analyst - Complex SQL)
  # LEVEL 4: Expert SQL Queries (Cortex Analyst - Complex Analytics)
  # LEVEL 5: Recursive CTE Queries (Cortex Analyst - Graph Traversal with SQL)
  # LEVEL 6: Advanced Graph Traversal Queries (Cortex Analyst - Complex Graph Operations)
  
  # =====================================================
  # SINGLE TABLE QUERIES (V_CUSTOMER only)
  # =====================================================
  # ==========================================================
  # TWO-TABLE JOINS (V_CUSTOMER + v_ACCOUNT + v_TRANSACTION)
  # ==========================================================
   # =====================================================
  # COMPLEX MULTI-JOIN QUERIES (Multiple relationships)
  # =====================================================
  # =====================================================
  # MULTIPLE-HOP QUERIES (Graph traversal)
  # =====================================================
  # =====================================================
  # SELF-JOIN QUERIES (Same table multiple times)
  # =====================================================

custom_instructions: |-
  This is a Knowledge Graph semantic model with node-edge architecture for customer,account,transaction & device data.
  
  ENTITY TABLES (nodes):
  - V_CUSTOMER: Customer entities with NODE_ID as primary key
  - V_ACCOUNT: Account entities with NODE_ID as primary key
  - V_TRANSACTION: Transaction entities with NODE_ID as primary key
  - V_DEVICE: Device entities with NODE_ID as primary key
  
  RELATIONSHIP TABLES (edges):
  - V_CUST_PRODUCT_OWNED : Customer-to-Product relationships (CUSTOMER_ID -> PRODUCT_ID)
  - V_CUST_ACCOUNT_OWNED: Customer-to-Account relationships (CUSTOMER_ID -> ACCOUNT_ID)
  - V_ACCOUNT_TRANSACTION: Account-to-Transaction relationships (ACCOUNT_ID -> TRANSACTION_ID)
  - V_CUST_DEVICE_OWNED: Customer-to-Device relationships (CUSTOMER_ID -> DEVICE_ID)

  TEMPORAL FILTERING:
  - For "current" or "active" queries: EFFECTIVE_END IS NULL OR EFFECTIVE_END >= CURRENT_DATE()
  - Include all historical data unless specifically asking for current/active information
  
  JOIN PATTERNS:
  - Always join entities through relationship tables, not directly
  
  QUERY BEST PRACTICES:
  - Use NODE_ID columns to join entity tables with relationship tables
  - For customer insights: join V_CUSTOMER -> V_CUST_ACCOUNT_OWNED -> V_ACCOUNT
  - For product analysis: join entity -> relationship view (V_CUST_PRODUCT_OWNED)
  - Focus on active relationships and recent transactions unless specifically asked about historical data
  - When analyzing customer behavior, prioritize current/active relationships unless historical analysis is requested

module_custom_instructions:
  sql_generation: |-
    Knowledge Graph SQL Generation Rules:
    1. Entity tables use NODE_ID as primary key
    2. Relationship tables use SRC_ID and DST_ID 
    3. For temporal queries, always check EFFECTIVE_START and EFFECTIVE_END
    4. Use the pre-defined filters when applicable
    5. Use the pre-defined metrics For aggregations
    6. For head-to-head analysis: join entity -> relationship view -> entity for both sides of the comparison